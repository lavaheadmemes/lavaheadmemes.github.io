<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questions</title>

<style>
    body {
        background: #e8f5e9;
        font-family: "Lucida Calligraphy", "Lucida Handwriting", cursive;
        padding: 20px;
        margin: 0;
        line-height: 1.8;
        color: #111;
        text-align: center;
        position: relative;
        overflow-x: hidden;
    }

    .container {
        max-width: 480px;
        margin: 0 auto;
        padding-top: 40px;
        position: relative;
        z-index: 2;
    }

    .mask {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.06;
        font-size: 160px;
        pointer-events: none;
        user-select: none;
        color: #66bb6a;
        z-index: 1;
    }

    p {
        font-size: 20px;
        margin-top: 20px;
        white-space: pre-line;
    }

    .btn-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 30px;
    }

    .btn {
        flex: 1;
        padding: 12px;
        background: #66bb6a;
        color: #fff;
        text-align: center;
        border-radius: 12px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        max-width: 150px;
    }

    .btn:active {
        background: #4b9b52;
    }

    /* Previous button lower + same size */
    .btn-bottom {
        display: block;
        width: 60%;
        margin: 50px auto 0 auto; /* pushes it DOWN */
        padding: 12px;
        background: #66bb6a;
        color: #fff;
        border-radius: 12px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
    }
</style>
</head>

<body>

<div class="mask">🐾</div>

<div class="container">

    <h1>Sooooo....</h1>

    <p>
Sonney Brennan will you be my sweetspark? 

My Sunshine on the darkest days?
My fav illegalrishman?
My purrrfect half?
    </p>

    <div class="btn-row">
        <a class="btn" href="yes.html">Yes</a>
        <a class="btn" href="no.html">No</a>
    </div>

    <a class="btn-bottom" href="page3.html">Previous</a>

</div>
</body>
</html>
